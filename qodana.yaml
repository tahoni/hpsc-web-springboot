####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################
version: "1.0"
linter: qodana-jvm
profile:
  name: qodana.recommended
bootstrap: mvn --batch-mode dependency:go-offline -q
raiseLicenseProblems: true
enablePackageSearch: true
include:
  - name: CheckDependencyLicenses # enables Qodana licence-audit inspections
  - name: VulnerableCodeUsagesInspection # enables Qodana security audit inspections
  - name: JvmTaintAnalysis # enables Qodana taint analysis inspections
exclude:
  - name: All
    paths:
      - src/main/java/za/co/hpsc/web/HpscWebApplication.java
